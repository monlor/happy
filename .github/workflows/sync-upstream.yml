name: Sync Upstream

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/slopus/happy.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Check if upstream is ahead
        id: check
        run: |
          git fetch origin main
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          if [ "$BEHIND" -gt 0 ]; then
            echo "Upstream is $BEHIND commit(s) ahead."
          else
            echo "Fork is up to date with upstream."
          fi

      - name: Merge upstream
        if: steps.check.outputs.behind != '0'
        run: git merge --no-edit upstream/main

      - name: Push to fork
        if: steps.check.outputs.behind != '0'
        run: git push origin main

      - name: Trigger image build
        if: steps.check.outputs.behind != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run build-images.yml --ref main

      - name: Report status
        if: steps.check.outputs.behind != '0'
        run: echo "Synced upstream main into fork."
