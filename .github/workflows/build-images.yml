name: Build and Push Docker Images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPO_OWNER: ${{ github.repository_owner }}

jobs:
  build:
    name: Build ${{ matrix.image }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: happy-server
            dockerfile: ./Dockerfile
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
            cache-scope: server-amd64
          - image: happy-server
            dockerfile: ./Dockerfile
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            cache-scope: server-arm64
          - image: happy-webapp
            dockerfile: ./Dockerfile.webapp
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
            cache-scope: webapp-amd64
          - image: happy-webapp
            dockerfile: ./Dockerfile.webapp
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            cache-scope: webapp-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate HAPPY_SERVER_URL
        env:
          HAPPY_SERVER_URL: ${{ vars.HAPPY_SERVER_URL }}
        run: test -n "$HAPPY_SERVER_URL"

      - name: Build and push platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/${{ matrix.image }}:build-${{ github.sha }}-${{ matrix.arch }}
          build-args: |
            HAPPY_SERVER_URL=${{ vars.HAPPY_SERVER_URL }}
          cache-from: type=gha,scope=${{ matrix.cache-scope }}
          cache-to: type=gha,scope=${{ matrix.cache-scope }},mode=max

  manifest:
    name: Publish ${{ matrix.image }} manifest
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - happy-server
          - happy-webapp
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,suffix=,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Create multi-platform manifest
        env:
          SOURCE_AMD64: ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/${{ matrix.image }}:build-${{ github.sha }}-amd64
          SOURCE_ARM64: ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/${{ matrix.image }}:build-${{ github.sha }}-arm64
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker buildx imagetools create \
              --tag "$tag" \
              "$SOURCE_AMD64" \
              "$SOURCE_ARM64"
          done <<< "$TAGS"
